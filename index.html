<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hima Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           ส่วนปรับแต่งโทนสี (เปลี่ยนโค้ดสีตรงนี้ให้เหมือนต้นฉบับ)
           ========================================= */
        :root {
            --bg-color: #F8F9FA;         /* สีพื้นหลังของหน้าเว็บ */
            --card-bg: #FFFFFF;          /* สีพื้นหลังของกรอบโปรไฟล์ */
            --text-main: #333333;        /* สีข้อความหลัก (ชื่อ) */
            --text-sub: #666666;         /* สีข้อความรอง (Bio) */
            --button-bg: #FFB6C1;        /* สีพื้นหลังปุ่มลิงก์ (เช่น สีชมพูพาสเทล) */
            --button-text: #FFFFFF;      /* สีตัวหนังสือบนปุ่ม */
            --button-hover: #FF9AA2;     /* สีปุ่มเวลาเอาเมาส์ชี้ */
        }

        /* =========================================
           ส่วนการจัดวาง (Layout) ไม่ต้องแก้เว้นแต่อยากปรับโครงสร้าง
           ========================================= */
        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .bio-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* เงาฟุ้งๆ คล้าย Canva */
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--card-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 10px 0;
        }

        p.bio-description {
            color: var(--text-sub);
            font-size: 15px;
            font-weight: 300;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            background-color: var(--button-bg);
            color: var(--button-text);
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 50px; /* ปุ่มโค้งมนเหมือน Canva */
            font-size: 16px;
            font-weight: 400;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .link-btn:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="bio-card">
        <img src="https://via.placeholder.com/150" alt="รูปโปรไฟล์" class="profile-img">
        
        <h1>Hima Bio</h1>
        
        <p class="bio-description">ใส่ข้อความทักทาย หรือคำอธิบายตัวตนของคุณที่นี่</p>

        <div class="link-container">
            <a href="ลิงก์ของคุณ" class="link-btn" target="_blank">ปุ่มที่ 1 (เช่น Facebook)</a>
            <a href="ลิงก์ของคุณ" class="link-btn" target="_blank">ปุ่มที่ 2 (เช่น Instagram)</a>
            <a href="ลิงก์ของคุณ" class="link-btn" target="_blank">ปุ่มที่ 3 (เช่น ผลงานของฉัน)</a>
        </div>
    </div>

</body>
</html>
