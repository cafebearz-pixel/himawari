<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Himawari</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #F8F3F2;
    --main-pink: #E8CCD7;
    --dark-pink: #B48F91;
    --text-mauve: #B48F91;
    --text-mauve-dark: #8F7072;
    --soft-beige: #DDD5D3;
    --dusty: #CFC1C1;
    --white: #FFFFFF;

    --font-thai: 'Mitr', sans-serif;
    --font-eng: 'Prompt', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: var(--font-thai);
    background: linear-gradient(135deg,#F8F3F2,#FFFFFF);
    color: var(--dark-pink);
    display:flex;
    justify-content:center;
    padding:30px 15px;
}

.container {
    max-width:500px;
    width:100%;
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* SECTION */
.section {
    background: var(--white);
    border-radius:20px;
    padding:20px;
    border:1px solid var(--soft-beige);
    box-shadow:0 5px 15px rgba(0,0,0,0.04);
}

.section-title {
    text-align:center;
    font-weight:600;
    margin-bottom:15px;
}

/* HEADER */
.header { text-align:center; }

.profile-img {
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid var(--white);
}

.animated-gradient-text {
    font-family: var(--font-eng);
    font-size:28px;
    background: linear-gradient(45deg,#E8CCD7,#CFC1C1,#DDD5D3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* BUTTON */
.btn {
    padding:14px;
    border-radius:50px;
    border:none;
    cursor:pointer;
    text-decoration:none;
    display:block;
    text-align:center;
}

.btn-main {
    background: linear-gradient(135deg,#E8CCD7,#CFC1C1);
    color:white;
}

.btn-outline {
    border:2px dashed var(--main-pink);
    color:var(--dark-pink);
}

/* LIST */
.list-item {
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.num-circle {
    background:var(--main-pink);
    color:white;
    width:25px;
    height:25px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* PRICE */
.price-item {
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px dashed var(--soft-beige);
}

/* CARD */
.card {
    background: linear-gradient(to right,#fff,#F8F3F2);
    padding:15px;
    border-radius:15px;
    border:1px solid var(--soft-beige);
}

/* BANK */
.bank {
    text-align:center;
    padding:15px;
    border-radius:15px;
    border:1px solid var(--main-pink);
}

/* SOCIAL */
.social {
    display:flex;
    gap:10px;
}

.social a {
    flex:1;
    padding:12px;
    border-radius:15px;
    text-align:center;
    border:1px solid var(--soft-beige);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="pfp.png" class="profile-img">
<h1 class="animated-gradient-text">Himawari</h1>
<p>Welcome To Hima Store</p>

<a class="btn btn-outline">เช็คคิวงาน</a>
</div>

<div class="section">
<h2 class="section-title">ขั้นตอน</h2>

<div class="list-item"><div class="num-circle">1</div>แจ้งงาน</div>
<div class="list-item"><div class="num-circle">2</div>เลือกแบบ</div>
<div class="list-item"><div class="num-circle">3</div>บรีฟ</div>
<div class="list-item"><div class="num-circle">4</div>ชำระเงิน</div>

<a class="btn btn-main">เลือกของ</a>
</div>

<div class="section">
<h2 class="section-title">ราคา</h2>

<div class="price-item"><span>น่ารัก</span><span>89-129</span></div>
<div class="price-item"><span>ออโรร่า</span><span>99-169</span></div>
<div class="price-item"><span>ADS</span><span>99-250</span></div>

</div>

<div class="section">
<h2 class="section-title">ชำระเงิน</h2>

<div class="bank">
<p>KBANK</p>
<p>0358209394</p>
</div>

</div>

<div class="section">
<h2 class="section-title">ติดต่อ</h2>

<div class="social">
<a>LINE</a>
<a>FB</a>
<a>IG</a>
</div>

</div>

</div>

</body>
</html>
